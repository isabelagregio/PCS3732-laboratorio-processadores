<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Calculadora de 4 Bits</title>
    <style>
        :root {
            --bg-principal: #f8fafc;
            --cor-card: #ffffff;
            --primaria: #1e3a8a;
            --primaria-hover: #1d4ed8;
            --secundaria: #0284c7;
            --secundaria-hover: #0369a1;
            --sucesso-bg: #ecfdf5;
            --sucesso-texto: #065f46;
            --sucesso-borda: #a7f3d0;
            --perigo-bg: #fef2f2;
            --perigo-texto: #991b1b;
            --perigo-borda: #fecaca;
            --texto-escuro: #1e293b;
            --texto-suave: #64748b;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-escuro);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .painel-calculadora {
            background-color: var(--cor-card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 350px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 22px;
            text-align: center;
            color: var(--primaria);
            letter-spacing: -0.5px;
        }

        .grupo-campo {
            margin-bottom: 18px;
        }

        .grupo-campo label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--texto-escuro);
        }

        .entrada-binaria {
            width: 100%;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fafafa;
            transition: border-color 0.2s;
        }

        .entrada-binaria:focus {
            outline: none;
            border-color: var(--secundaria);
            background-color: #ffffff;
        }

        .bloco-botoes {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-operacao {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-operacao:active {
            transform: scale(0.98);
        }

        .btn-soma { background-color: var(--primaria); }
        .btn-soma:hover { background-color: var(--primaria-hover); }

        .btn-subtracao { background-color: var(--secundaria); }
        .btn-subtracao:hover { background-color: var(--secundaria-hover); }

        .quadro-notificacao {
            margin-top: 22px;
            padding: 12px 16px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
        }

        .quadro-notificacao .titulo-op {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 4px;
            margin-bottom: 8px;
            color: var(--texto-suave);
        }

        .msg-sucesso {
            background-color: var(--sucesso-bg);
            color: var(--sucesso-texto);
            border: 1px solid var(--sucesso-borda);
        }

        .msg-erro-overflow {
            background-color: var(--perigo-bg);
            color: var(--perigo-texto);
            border: 1px solid var(--perigo-borda);
        }
    </style>
</head>
<body>

<div class="painel-calculadora">
    <h2>Painel da Calculadora</h2>
    
    <div class="grupo-campo">
        <label for="campoOperandoA">Operando A (4 bits):</label>
        <input type="text" id="campoOperandoA" maxlength="4" value="0110" oninput="sanitizarEntrada(this)" placeholder="0000" class="entrada-binaria">
    </div>
    
    <div class="grupo-campo">
        <label for="campoOperandoB">Operando B (4 bits):</label>
        <input type="text" id="campoOperandoB" maxlength="4" value="0010" oninput="sanitizarEntrada(this)" placeholder="0000" class="entrada-binaria">
    </div>
    
    <div class="bloco-botoes">
        <button class="btn-operacao btn-soma" onclick="executarFluxoCalculo('add')">SOMA</button>
        <button class="btn-operacao btn-subtracao" onclick="executarFluxoCalculo('sub')">SUB</button>
    </div>

    <div id="zona-status" class="quadro-notificacao"></div>
</div>

<script>
    const ENDERECO_ESP32 = "http://192.168.4.1";

    function sanitizarEntrada(elemento) {
        elemento.value = elemento.value.replace(/[^01]/g, '');
    }

    function executarFluxoCalculo(operacaoMatematica) {
        const strA = document.getElementById('campoOperandoA').value.trim();
        const strB = document.getElementById('campoOperandoB').value.trim();
        const displayResultado = document.getElementById('zona-status');

        if (strA.length !== 4 || strB.length !== 4) {
            displayResultado.className = "quadro-notificacao msg-erro-overflow";
            displayResultado.innerHTML = "<b>Erro de Entrada:</b> Ambos os operandos devem conter exatamente 4 bits preenchidos.";
            displayResultado.style.display = "block";
            return;
        }

        const queryTarget = `${ENDERECO_ESP32}/calc?a=${strA}&b=${strB}&op=${operacaoMatematica}`;

        fetch(queryTarget)
            .then(res => {
                if (!res.ok) throw new Error("Falha na comunicação com o barramento do ESP32.");
                return res.json();
            })
            .then(data => {
                displayResultado.style.display = "block";
                
                if (data.overflow) {
                    displayResultado.className = "quadro-notificacao msg-erro-overflow";
                    displayResultado.innerHTML = `<div class="titulo-op">Dados do ESP32 (Hardware)</div>
                                                  <b>Operação:</b> ${data.operacao}<br>
                                                  🚨 <b>Estouro de Overflow Detectado no C!</b><br>
                                                  Saída nos LEDs: ${data.resultado_bin}`;
                } else {
                    displayResultado.className = "quadro-notificacao msg-sucesso";
                    displayResultado.innerHTML = `<div class="titulo-op">Dados do ESP32 (Hardware)</div>
                                                  <b>Operação:</b> ${data.operacao}<br>
                                                  ✅ <b>Cálculo Realizado com Sucesso!</b><br>
                                                  Saída nos LEDs: ${data.resultado_bin}`;
                }
            })
            .catch(err => {
                displayResultado.className = "quadro-notificacao msg-erro-overflow";
                displayResultado.innerHTML = "<b>Erro de Conexão:</b> Não foi possível estabelecer comunicação com o Wi-Fi do ESP32.";
                displayResultado.style.display = "block";
                console.error(err);
            });
    }
</script>

</body>
</html>
